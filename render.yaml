databases:
  - name: igualado-pintura-db
    plan: free
    databaseName: igualado_pintura
    user: igualado_user

services:
  - type: web
    name: igualado-pintura
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: igualado-pintura-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: igualado-pintura
          property: url
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "DYRLO <noreply@dyrlo.com>"
      - key: NODE_ENV
        value: production
